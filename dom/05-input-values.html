<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DOM — Input Values</title>
  <style>
    *::before,
    *::after,
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f2f5;
      padding: 24px;
      transition: 0.2s;
    }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 16px;
      background: #fff;
      border-radius: 8px;
      color: #3949ab;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
    }

    .hdr {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 28px;
      border-radius: 14px;
      margin-bottom: 22px;
      border-left: 6px solid #1e88e5;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .07);
    }

    .ipt {
      height: 50px;
      width: 100%;
      cursor: pointer;
      border: none;
      background: none;
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back">← Workshop Index</a>
  <div class="hdr">
    <h1>Reading User Input</h1>
    <p>Capture data in real-time</p>
  </div>
  <div class="card">
    <input type="color" id="colorPicker" class="ipt">
    <p id="colorVal" style="margin-top:15px; font-weight:700; text-align:center">Selected: #000000</p>
  </div>
  <script>
    document.getElementById('colorPicker').addEventListener('input', (e) => {
      const val = e.target.value;
      document.getElementById('colorVal').innerText = `Selected: ${val}`;
      document.body.style.backgroundColor = val + "22";
    });
  </script>
</body>

</html>
