<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DOM — innerHTML</title>
  <style>
    *::before,
    *::after,
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f2f5;
      padding: 24px;
    }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 16px;
      background: #fff;
      border-radius: 8px;
      color: #3949ab;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
    }

    .hdr {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 28px;
      border-radius: 14px;
      margin-bottom: 22px;
      border-left: 6px solid #1e88e5;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .07);
    }

    .target {
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .btn {
      padding: 10px 20px;
      background: #1e88e5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back">← Workshop Index</a>
  <div class="hdr">
    <h1>HTML Injection</h1>
    <p>Modifying internal HTML structure</p>
  </div>
  <div class="card">
    <div id="target" class="target">This is plain text.</div>
    <button class="btn" onclick="inject()">Inject HTML Tags</button>
  </div>
  <script>
    function inject() {
      document.getElementById('target').innerHTML =
        `<h3 style="color:#e53935">Alert!</h3><p>This was injected via <b>innerHTML</b>.</p>`;
    }
  </script>
</body>

</html>
