<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DOM — Event Listeners</title>
  <style>
    *::before,
    *::after,
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f2f5;
      padding: 24px;
    }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 16px;
      background: #fff;
      border-radius: 8px;
      color: #3949ab;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, .12);
    }

    .hdr {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 28px;
      border-radius: 14px;
      margin-bottom: 22px;
      border-left: 6px solid #1e88e5;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .07);
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 6px;
      border: none;
      background: #1e88e5;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back">← Workshop Index</a>
  <div class="hdr">
    <h1>Event Listeners</h1>
    <p>Modern way to handle interactions</p>
  </div>
  <div class="card">
    <button id="alertBtn" class="btn">Click Me (addEventListener)</button>
  </div>
  <script>
    document.getElementById('alertBtn').addEventListener('click', () => {
      alert('Event Listener Triggered! 🚀');
    });
  </script>
</body>

</html>
