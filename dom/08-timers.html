<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DOM — Timers</title>
  <style>
    *::before,
    *::after,
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f2f5;
      padding: 24px;
    }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 16px;
      background: #fff;
      border-radius: 8px;
      color: #3949ab;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
    }

    .hdr {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 28px;
      border-radius: 14px;
      margin-bottom: 22px;
      border-left: 6px solid #1e88e5;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .07);
      text-align: center;
    }

    #timer {
      font-size: 64px;
      font-weight: 800;
      margin-bottom: 20px;
      color: #1a1a2e;
    }

    .btn {
      padding: 12px 30px;
      background: #1e88e5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back">← Workshop Index</a>
  <div class="hdr">
    <h1>Timers</h1>
    <p>Using setInterval for repetition</p>
  </div>
  <div class="card">
    <h1 id="timer">0</h1>
    <button class="btn" onclick="start()">Start Counter</button>
  </div>
  <script>
    let count = 0;
    let running = false;
    function start() {
      if (running) return;
      running = true;
      setInterval(() => {
        count++;
        document.getElementById('timer').innerText = count;
      }, 1000);
    }
  </script>
</body>

</html>
