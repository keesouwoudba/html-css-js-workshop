<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DOM — querySelector</title>
  <style>
    *::before,
    *::after,
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f2f5;
      padding: 24px;
      color: #1a1a2e;
      line-height: 1.5;
    }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 16px;
      background: #fff;
      border-radius: 8px;
      color: #3949ab;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, .12);
    }

    .hdr {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 28px;
      border-radius: 14px;
      margin-bottom: 22px;
      border-left: 6px solid #1e88e5;
    }

    .badge {
      display: inline-block;
      background: #1e88e5;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .hdr h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .07);
    }

    .cl {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 14px;
      padding-bottom: 9px;
      border-bottom: 2px solid #f5f5f5;
    }

    .demo {
      background: #f8faff;
      border: 1.5px dashed #c5cae9;
      border-radius: 8px;
      padding: 20px;
    }

    .btn {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      background: #1e88e5;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      margin-top: 10px;
    }

    .highlight {
      background: #fff59d;
      color: #1a1a2e;
      padding: 5px;
      border-radius: 4px;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back">← Workshop Index</a>
  <div class="hdr">
    <div class="badge">DOM</div>
    <h1>querySelector</h1>
    <p>Select elements using CSS-style selectors</p>
  </div>
  <div class="card">
    <div class="cl">Select by Class</div>
    <div class="demo">
      <p class="text-box">I am a paragraph with a class.</p>
      <button class="btn" onclick="highlight()">Toggle Highlight Class</button>
    </div>
  </div>
  <script>
    function highlight() {
      document.querySelector('.text-box').classList.toggle('highlight');
    }
  </script>
</body>

</html>
