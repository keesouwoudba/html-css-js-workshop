<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CSS — Hover & Transitions</title>
  <style>
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f2f5;
      padding: 24px;
      color: #1a1a2e;
      line-height: 1.5;
    }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 16px;
      background: #fff;
      border-radius: 8px;
      color: #3949ab;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, .12);
    }

    .back:hover {
      background: #f5f5f5;
    }

    .hdr {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 28px;
      border-radius: 14px;
      margin-bottom: 22px;
      border-left: 6px solid #8e24aa;
    }

    .badge {
      display: inline-block;
      background: #8e24aa;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .hdr h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .hdr p {
      opacity: .6;
      font-size: 13px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .07);
    }

    .cl {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-bottom: 14px;
      padding-bottom: 9px;
      border-bottom: 2px solid #f5f5f5;
    }

    .demo {
      background: #f8faff;
      border: 1.5px dashed #c5cae9;
      border-radius: 8px;
      padding: 20px;
    }

    pre {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 12px;
      line-height: 1.7;
      overflow-x: auto;
      margin-top: 12px;
      font-family: "Courier New", monospace;
      white-space: pre;
    }

    .note {
      background: #fff8e1;
      border-left: 3px solid #ffca28;
      padding: 10px 14px;
      border-radius: 0 6px 6px 0;
      font-size: 12px;
      color: #555;
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      background: #8e24aa;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      margin: 4px 4px 4px 0;
    }

    .btn:hover {
      opacity: .85;
    }

    .ipt {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1.5px solid #ddd;
      font-size: 13px;
      outline: none;
    }

    .ipt:focus {
      border-color: #8e24aa;
    }

    .out {
      margin-top: 12px;
      padding: 12px 16px;
      background: #f1f8e9;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      border: 1.5px solid #c5e1a5;
      min-height: 40px;
      white-space: pre-wrap;
    }
  </style>
  <style>
    .hover-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .hover-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      background: #fff;
    }

    .hover-btn {
      background: #8e24aa;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      transition: 0.2s;
      cursor: pointer;
    }

    .hover-btn:hover {
      background: #ab47bc;
      transform: scale(1.05);
    }

    .hover-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back">← Workshop Index</a>
  <div class="hdr">
    <div class="badge">CSS</div>
    <h1>Hover & Transitions</h1>
    <p>Making things feel interactive</p>
  </div>

  <div class="card">
    <div class="cl">Smooth Hover Button</div>
    <div class="demo" style="text-align:center">
      <button class="hover-btn">Hover Me!</button>
    </div>
    <pre>.btn { transition: 0.2s; }
.btn:hover { transform: scale(1.05); }</pre>
  </div>
  <div class="card">
    <div class="cl">Hoverable Card</div>
    <div class="demo">
      <div class="hover-card"
        style="border:1px solid #ddd;padding:20px;border-radius:12px;background:#f9f9f9;text-align:center">
        <h3 style="margin-bottom:8px">Interactive Card</h3>
        <p style="color:#666">Hover over this box to see it lift up smoothly.</p>
      </div>
    </div>
  </div>
</body>

</html>
