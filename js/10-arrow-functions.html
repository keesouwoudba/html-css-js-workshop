<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>JS — Arrow Functions</title>
  <style>
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f2f5;
      padding: 24px;
      color: #1a1a2e;
      line-height: 1.5;
    }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 16px;
      background: #fff;
      border-radius: 8px;
      color: #3949ab;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, .12);
    }

    .back:hover {
      background: #f5f5f5;
    }

    .hdr {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 28px;
      border-radius: 14px;
      margin-bottom: 22px;
      border-left: 6px solid #f57f17;
    }

    .badge {
      display: inline-block;
      background: #f57f17;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .hdr h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .hdr p {
      opacity: .6;
      font-size: 13px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .07);
    }

    .cl {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-bottom: 14px;
      padding-bottom: 9px;
      border-bottom: 2px solid #f5f5f5;
    }

    .demo {
      background: #f8faff;
      border: 1.5px dashed #c5cae9;
      border-radius: 8px;
      padding: 20px;
    }

    pre {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 12px;
      line-height: 1.7;
      overflow-x: auto;
      margin-top: 12px;
      font-family: "Courier New", monospace;
      white-space: pre;
    }

    .btn {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      background: #f57f17;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      margin: 4px 4px 4px 0;
    }

    .out {
      margin-top: 12px;
      padding: 12px 16px;
      background: #fffde7;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      border: 1.5px solid #fff176;
      min-height: 40px;
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back">← Workshop Index</a>
  <div class="hdr">
    <div class="badge">JS</div>
    <h1>Arrow Functions</h1>
    <p>Shorter syntax for functions</p>
  </div>

  <div class="card">
    <div class="cl">Modern Syntax</div>
    <div class="demo">
      <button class="btn" onclick="runArrow()">Say Hello</button>
      <div id="output" class="out">...</div>
      <pre>// Traditional
function add(a, b) { return a + b; }

// Arrow Function
const add = (a, b) => a + b;</pre>
    </div>
  </div>

  <script>
    const greet = (user) => `Welcome back, ${user}!`;
    function runArrow() {
      document.getElementById('output').innerText = greet("Developer");
    }
  </script>
</body>

</html>
